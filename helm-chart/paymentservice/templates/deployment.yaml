apiVersion: apps/v1
kind: Deployment

metadata:
  name: paymentservice

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: paymentservice

  template:
    metadata:
      labels:
        app: paymentservice

    spec:
      serviceAccountName: default
      terminationGracePeriodSeconds: 5

      containers:
        - name: server

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.containerPort }}

          env:
            - name: PORT
              value: "50051"

            - name: DISABLE_PROFILER
              value: "1"

          # ✅ FIX: Replace grpc probe with HTTP health check
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3

          resources:
{{ toYaml .Values.resources | indent 12 }}

name: AdService CI

on:
  push:
    branches:
      - main
    paths:
      - 'src/adservice/**'

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    env:
      SERVICE_NAME: adservice

    steps:

      - name: Checkout Source Repo
        uses: actions/checkout@v4

      - name: Set Image Tag
        run: |
          echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/adservice:${IMAGE_TAG} \
          ./src/adservice

      - name: Push Docker Image
        run: |
          docker push \
          ${{ secrets.DOCKERHUB_USERNAME }}/adservice:${IMAGE_TAG}

      - name: Clone GitOps Repo
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_PAT }}@github.com/vishnukrajan007/10-microservices-gitops.git

      - name: Update values.yaml
        run: |
          cd 10-microservices-gitops

          sed -i "s|repository:.*|repository: ${{ secrets.DOCKERHUB_USERNAME }}/adservice|g" adservice/values.yaml

          sed -i "s|tag:.*|tag: ${IMAGE_TAG}|g" adservice/values.yaml

      - name: Commit Changes
        run: |
          cd 10-microservices-gitops

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git commit -m "Update adservice image ${IMAGE_TAG}" || exit 0

          git push

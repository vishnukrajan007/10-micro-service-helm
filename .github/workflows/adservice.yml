name: AdService CI

on:
  push:
    branches:
      - main
    paths:
      - 'src/adservice/**'

permissions:
  contents: read

jobs:
  build-push-update:
    runs-on: ubuntu-latest

    env:
      SERVICE_NAME: adservice

    steps:

      - name: Checkout Source Repository
        uses: actions/checkout@v4

      - name: Generate Image Tag
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "Generated Tag: $IMAGE_TAG"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/adservice:${IMAGE_TAG} \
            ./src/adservice

      - name: Push Docker Image
        run: |
          docker push \
            ${{ secrets.DOCKERHUB_USERNAME }}/adservice:${IMAGE_TAG}

      - name: Clone GitOps Repository
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_PAT }}@github.com/vishnukrajan007/10-microservices-gitops.git

      - name: Update Helm Values
        run: |
          cd 10-microservices-gitops

          sed -i "s|repository:.*|repository: ${{ secrets.DOCKERHUB_USERNAME }}/adservice|g" adservice/values.yaml
          sed -i "s|tag:.*|tag: ${IMAGE_TAG}|g" adservice/values.yaml

          echo "Updated values.yaml"
          cat adservice/values.yaml

      - name: Commit and Push GitOps Changes
        run: |
          cd 10-microservices-gitops

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add adservice/values.yaml

          git commit -m "Update adservice image tag ${IMAGE_TAG}" || exit 0

          git push origin main

name: Cartservice CI

on:
  push:
    branches:
      - main
    paths:
      - 'src/cartservice/**'

jobs:

  docker-build-push:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}

    steps:

      - name: Checkout Source Repository
        uses: actions/checkout@v4

      - name: Generate Image Tag
        id: tag
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./src/cartservice
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cartservice:${{ steps.tag.outputs.image_tag }}

  update-gitops:
    needs: docker-build-push
    runs-on: ubuntu-latest

    steps:

      - name: Clone GitOps Repository
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_PAT }}@github.com/vishnukrajan007/10-microservices-gitops.git

      - name: Update values.yaml
        run: |
          cd 10-microservices-gitops

          sed -i "s|repository:.*|repository: ${{ secrets.DOCKERHUB_USERNAME }}/adservice|g" cartservice/values.yaml

          sed -i "s|tag:.*|tag: ${{ needs.docker-build-push.outputs.image_tag }}|g" cartservice/values.yaml

          cat cartservice/values.yaml

      - name: Commit and Push Changes
        run: |
          cd 10-microservices-gitops

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add cartservice/values.yaml

          git commit -m "Update cartservice image tag ${{ needs.docker-build-push.outputs.image_tag }}" || exit 0

          git push origin main
